name: Cypress API Tests

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ develop, main ]

jobs:
  cypress-tests:
    runs-on: ubuntu-latest

    services:
      serverest:
        image: paulogoncalvesbh/serverest:latest
        ports:
          - 3001:3000
        options: >-
          --health-cmd "wget -qO- http://localhost:3000/usuarios || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:

      - name: 🔄 Checkout repositório
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm ci

      - name: 🧪 Rodar testes Cypress
        run: npx cypress run
        env:
          CYPRESS_BASE_URL: http://localhost:3030

      - name: 📊 Gerar Allure Report
        if: always()
        run: npm run allure:generate

      - name: 📊 Publicar Allure Report
        if: always()
        uses: simple-ioann/allure-report-action@v2
        with:
          allure-results: allure-results
          allure-report: allure-report

      - name: 📁 Upload Allure Report como artefato
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 30